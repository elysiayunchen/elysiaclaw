services:
  - type: web
    name: elysiaclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ELYSIACLAW_STATE_DIR
        value: /data/.elysiaclaw
      - key: ELYSIACLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: ELYSIACLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: elysiaclaw-data
      mountPath: /data
      sizeGB: 1
