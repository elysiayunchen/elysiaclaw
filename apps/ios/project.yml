name: ElysiaClaw
options:
  bundleIdPrefix: ai.elysiaclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  ElysiaClawKit:
    path: ../shared/ElysiaClawKit
  Swabble:
    path: ../../Swabble

schemes:
  ElysiaClaw:
    shared: true
    build:
      targets:
        ElysiaClaw: all
    test:
      targets:
        - ElysiaClawTests
        - ElysiaClawLogicTests
  ElysiaClawLogicTests:
    shared: true
    build:
      targets:
        ElysiaClawLogicTests: all
    test:
      targets:
        - ElysiaClawLogicTests

targets:
  ElysiaClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: ElysiaClawShareExtension
        embed: true
      - target: ElysiaClawActivityWidget
        embed: true
      - target: ElysiaClawWatchApp
      - package: ElysiaClawKit
      - package: ElysiaClawKit
        product: ElysiaClawChatUI
      - package: ElysiaClawKit
        product: ElysiaClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/ElysiaClaw.entitlements
        CODE_SIGN_STYLE: "$(ELYSIACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ELYSIACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(ELYSIACLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(ELYSIACLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          ELYSIACLAW_PUSH_TRANSPORT: direct
          ELYSIACLAW_PUSH_DISTRIBUTION: local
          ELYSIACLAW_PUSH_RELAY_BASE_URL: ""
          ELYSIACLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          ELYSIACLAW_PUSH_TRANSPORT: direct
          ELYSIACLAW_PUSH_DISTRIBUTION: local
          ELYSIACLAW_PUSH_RELAY_BASE_URL: ""
          ELYSIACLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.elysiaclaw.ios
            CFBundleURLSchemes:
              - elysiaclaw
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.elysiaclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: ElysiaClaw discovers and connects to your ElysiaClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _elysiaclaw-gw._tcp
        NSCameraUsageDescription: ElysiaClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: ElysiaClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: ElysiaClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: ElysiaClaw needs microphone access for voice wake.
        NSMotionUsageDescription: ElysiaClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: ElysiaClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: ElysiaClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        ElysiaClawPushTransport: "$(ELYSIACLAW_PUSH_TRANSPORT)"
        ElysiaClawPushDistribution: "$(ELYSIACLAW_PUSH_DISTRIBUTION)"
        ElysiaClawPushRelayBaseURL: "$(ELYSIACLAW_PUSH_RELAY_BASE_URL)"
        ElysiaClawPushAPNsEnvironment: "$(ELYSIACLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  ElysiaClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: ElysiaClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ELYSIACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ELYSIACLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(ELYSIACLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(ELYSIACLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClaw Share
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  ElysiaClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/ElysiaClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ELYSIACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ELYSIACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(ELYSIACLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClaw Activity
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ElysiaClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: ElysiaClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(ELYSIACLAW_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClaw
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(ELYSIACLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  ElysiaClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(ELYSIACLAW_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClaw
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(ELYSIACLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  ElysiaClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: ElysiaClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ELYSIACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ELYSIACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.elysiaclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ElysiaClaw.app/ElysiaClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClawTests
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"

  ElysiaClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: ElysiaClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(ELYSIACLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(ELYSIACLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.elysiaclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: ElysiaClawLogicTests
        CFBundleShortVersionString: "$(ELYSIACLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(ELYSIACLAW_BUILD_VERSION)"
